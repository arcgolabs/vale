name: vale-bench

services:
  upstream:
    image: ${UPSTREAM_IMAGE:-caddy:2-alpine}
    command: ["caddy", "run", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]
    volumes:
      - ./caddy-upstream.Caddyfile:/etc/caddy/Caddyfile:ro
    expose:
      - "8080"

  vale:
    image: ${VALE_IMAGE:-ghcr.io/arcgolabs/vale:latest}
    command: ["--config", "/etc/vale/vale.hcl", "--log-level", "error", "--raft-data-dir", "/tmp/vale/raft"]
    volumes:
      - ./vale.hcl:/etc/vale/vale.hcl:ro
    ports:
      - "18080:8080"
      - "28090:19090"
    depends_on:
      - upstream

  traefik:
    image: ${TRAEFIK_IMAGE:-traefik:v3}
    command: ["--configFile=/etc/traefik/traefik.yml"]
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik-dynamic.yml:/etc/traefik/dynamic.yml:ro
    ports:
      - "18081:8080"
    depends_on:
      - upstream

  caddy:
    image: ${CADDY_IMAGE:-caddy:2-alpine}
    command: ["caddy", "run", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    ports:
      - "18082:8080"
    depends_on:
      - upstream

  nginx:
    image: ${NGINX_IMAGE:-nginx:1.27-alpine}
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "18083:8080"
    depends_on:
      - upstream
