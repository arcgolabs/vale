name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  GOLANGCI_LINT_VERSION: v2.12.2

jobs:
  lint:
    name: lint / ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: root
            path: .
          - module: cluster/raftnode
            path: cluster/raftnode
          - module: cmd
            path: cmd
          - module: observability/prometheus
            path: observability/prometheus
          - module: provider/docker
            path: provider/docker
          - module: provider/file
            path: provider/file
          - module: provider/fileconfig
            path: provider/fileconfig
          - module: provider/k8s
            path: provider/k8s
          - module: examples/embedded_builder_components
            path: examples/embedded_builder_components
          - module: examples/embedded_custom_middleware
            path: examples/embedded_custom_middleware
          - module: examples/embedded_custom_provider
            path: examples/embedded_custom_provider
          - module: examples/embedded_extension_components
            path: examples/embedded_extension_components
          - module: examples/embedded_jwt_middleware
            path: examples/embedded_jwt_middleware
          - module: examples/embedded_multi_provider
            path: examples/embedded_multi_provider
          - module: examples/embedded_static_config
            path: examples/embedded_static_config
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: ${{ matrix.path }}
          args: ./...

  test:
    name: test / ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: root
            path: .
          - module: cluster/raftnode
            path: cluster/raftnode
          - module: cmd
            path: cmd
          - module: observability/prometheus
            path: observability/prometheus
          - module: provider/docker
            path: provider/docker
          - module: provider/file
            path: provider/file
          - module: provider/fileconfig
            path: provider/fileconfig
          - module: provider/k8s
            path: provider/k8s
          - module: examples/embedded_builder_components
            path: examples/embedded_builder_components
          - module: examples/embedded_custom_middleware
            path: examples/embedded_custom_middleware
          - module: examples/embedded_custom_provider
            path: examples/embedded_custom_provider
          - module: examples/embedded_extension_components
            path: examples/embedded_extension_components
          - module: examples/embedded_jwt_middleware
            path: examples/embedded_jwt_middleware
          - module: examples/embedded_multi_provider
            path: examples/embedded_multi_provider
          - module: examples/embedded_static_config
            path: examples/embedded_static_config
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go test
        run: go test ./...
        working-directory: ${{ matrix.path }}

      - name: Go vet
        run: go vet ./...
        working-directory: ${{ matrix.path }}
