name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Go test and vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Root tests
        run: go test ./...

      - name: Workspace module tests
        run: >
          go test
          ./cluster/raftnode/...
          ./cmd/...
          ./observability/prometheus/...
          ./provider/docker/...
          ./provider/file/...
          ./provider/fileconfig/...
          ./provider/k8s/...
          ./examples/embedded_multi_provider/...
          ./examples/embedded_static_config/...

      - name: Root vet
        run: go vet ./...

      - name: Workspace module vet
        run: >
          go vet
          ./cluster/raftnode/...
          ./cmd/...
          ./observability/prometheus/...
          ./provider/docker/...
          ./provider/file/...
          ./provider/fileconfig/...
          ./provider/k8s/...
          ./examples/embedded_multi_provider/...
          ./examples/embedded_static_config/...
