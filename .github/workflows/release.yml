name: Release

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/release.yml
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish.
        required: true
        type: string
      prerelease:
        description: Mark the GitHub Release as a prerelease.
        default: false
        required: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail

          tag=""
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag="${GITHUB_REF_NAME}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            message="$(jq -r '.head_commit.message // ""' "${GITHUB_EVENT_PATH}")"
            if [[ "${message}" =~ \[release:([^]]+)\] ]]; then
              tag="${BASH_REMATCH[1]}"
            fi
          fi

          if [[ -z "${tag}" ]]; then
            echo "skip=true" >> "${GITHUB_OUTPUT}"
            echo "No release tag was requested."
            exit 0
          fi

          echo "skip=false" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        if: steps.release.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag
        if: steps.release.outputs.skip != 'true'
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          git rev-parse --verify "refs/tags/${tag}"
          git checkout --detach "refs/tags/${tag}"
          echo "commit=$(git rev-parse --short=12 HEAD)" >> "${GITHUB_OUTPUT}"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${GITHUB_OUTPUT}"

      - name: Set up Go
        if: steps.release.outputs.skip != 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release notes
        if: steps.release.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"

          awk -v tag="${tag}" '
            $0 == "## " tag || $0 ~ ("^## " tag " - ") { found = 1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md

          if ! grep -q '[^[:space:]]' release-notes.md; then
            printf 'See CHANGELOG.md for %s.\n' "${tag}" > release-notes.md
          fi

      - name: Build release artifacts
        if: steps.release.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.release.outputs.tag }}"
          commit="${{ steps.tag.outputs.commit }}"
          date="${{ steps.tag.outputs.date }}"
          ldflags="-s -w -X main.version=${tag} -X main.commit=${commit} -X main.date=${date}"
          platforms=(
            linux/amd64
            linux/arm64
            darwin/amd64
            darwin/arm64
            windows/amd64
            windows/arm64
          )

          rm -rf dist
          mkdir -p dist

          for platform in "${platforms[@]}"; do
            os="${platform%/*}"
            arch="${platform#*/}"
            artifact="valed_${tag}_${os}_${arch}"
            binary="valed"
            archive="${artifact}.tar.gz"
            if [[ "${os}" == "windows" ]]; then
              binary="valed.exe"
              archive="${artifact}.zip"
            fi

            mkdir -p "dist/${artifact}"
            GOOS="${os}" GOARCH="${arch}" CGO_ENABLED=0 \
              go build -C cmd -trimpath -ldflags="${ldflags}" -o "../dist/${artifact}/${binary}" .
            cp README.md LICENSE "dist/${artifact}/"

            if [[ "${os}" == "windows" ]]; then
              (cd "dist/${artifact}" && zip -qr "../${archive}" .)
            else
              tar -C "dist/${artifact}" -czf "dist/${archive}" .
            fi
            rm -rf "dist/${artifact}"
          done

          (cd dist && sha256sum *.tar.gz *.zip > checksums.txt)

      - name: Publish release
        if: steps.release.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ inputs.prerelease || 'false' }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          title="Vale ${tag}"

          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${title}" \
              --notes-file release-notes.md
          else
            args=(
              release create "${tag}"
              --repo "${GITHUB_REPOSITORY}"
              --title "${title}"
              --notes-file release-notes.md
              --verify-tag
            )

            if [[ "${PRERELEASE}" == "true" ]]; then
              args+=(--prerelease)
            fi

            gh "${args[@]}"
          fi

          gh release upload "${tag}" dist/* --repo "${GITHUB_REPOSITORY}" --clobber
