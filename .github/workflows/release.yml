name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "*/v*"
      - "*/*/v*"
      - "*/*/*/v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish.
        required: true
        type: string
      prerelease:
        description: Mark the GitHub Release as a prerelease.
        default: false
        required: false
        type: boolean

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail

          tag=""
          module_path="."
          is_root="false"
          module_version=""

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            message="$(jq -r '.head_commit.message // ""' "${GITHUB_EVENT_PATH}")"
            if [[ "${message}" =~ \[release:([^]]+)\] ]]; then
              tag="${BASH_REMATCH[1]}"
            fi
          fi

          if [[ -z "${tag}" ]]; then
            echo "skip=true" >> "${GITHUB_OUTPUT}"
            echo "No release tag was requested."
            exit 0
          fi

          if [[ "${tag}" == v* ]]; then
            module_path="."
            is_root="true"
            module_version="${tag}"
          elif [[ "${tag}" == */v* ]]; then
            module_path="${tag%/*}"
            module_version="${tag##*/}"
            if [[ ! -d "${module_path}" ]]; then
              echo "skip=true" >> "${GITHUB_OUTPUT}"
              echo "Tag ${tag} points to unknown module path: ${module_path}." >&2
              exit 0
            fi
            if [[ "${module_version}" != v* ]]; then
              echo "skip=true" >> "${GITHUB_OUTPUT}"
              echo "Tag ${tag} has invalid module version suffix: ${module_version}." >&2
              exit 0
            fi
          else
            echo "skip=true" >> "${GITHUB_OUTPUT}"
            echo "Tag ${tag} does not match a supported release format." >&2
            exit 0
          fi

          module_slug="${module_path//\//-}"
          if [[ "${module_slug}" == "." ]]; then
            module_slug="core"
          fi

          release_title="Vale ${tag}"
          if [[ "${is_root}" == "false" ]]; then
            release_title="Vale (${module_path}) ${module_version}"
          fi

          echo "skip=false" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "module_path=${module_path}" >> "${GITHUB_OUTPUT}"
          echo "module_version=${module_version}" >> "${GITHUB_OUTPUT}"
          echo "module_slug=${module_slug}" >> "${GITHUB_OUTPUT}"
          echo "release_title=${release_title}" >> "${GITHUB_OUTPUT}"
          echo "is_root=${is_root}" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        if: steps.release.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag
        if: steps.release.outputs.skip != 'true'
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          git rev-parse --verify "refs/tags/${tag}"
          git checkout --detach "refs/tags/${tag}"
          echo "commit=$(git rev-parse --short=12 HEAD)" >> "${GITHUB_OUTPUT}"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${GITHUB_OUTPUT}"

      - name: Build release notes
        if: steps.release.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          module_version="${{ steps.release.outputs.module_version }}"

          awk -v tag="${module_version}" '
            $0 == "## " tag || $0 ~ ("^## " tag " - ") { found = 1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md

          if ! grep -q '[^[:space:]]' release-notes.md; then
            printf 'See CHANGELOG.md for %s.\n' "${module_version}" > release-notes.md
          fi

      - name: Set up Go
        if: >
          steps.release.outputs.skip != 'true' &&
          (steps.release.outputs.is_root == 'true' || steps.release.outputs.module_path == 'cmd')
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build root release artifacts
        if: steps.release.outputs.skip != 'true' && steps.release.outputs.is_root == 'true'
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.release.outputs.tag }}"
          commit="${{ steps.tag.outputs.commit }}"
          date="${{ steps.tag.outputs.date }}"
          ldflags="-s -w -X main.version=${tag} -X main.commit=${commit} -X main.date=${date}"
          platforms=(
            linux/amd64
            linux/arm64
            darwin/amd64
            darwin/arm64
            windows/amd64
            windows/arm64
          )

          rm -rf dist
          mkdir -p dist/artifacts dist/image dist/work

          for platform in "${platforms[@]}"; do
            os="${platform%/*}"
            arch="${platform#*/}"
            artifact="valed_${tag}_${os}_${arch}"
            binary="valed"
            archive="${artifact}.tar.gz"
            if [[ "${os}" == "windows" ]]; then
              binary="valed.exe"
              archive="${artifact}.zip"
            fi

            mkdir -p "dist/work/${artifact}"
            GOOS="${os}" GOARCH="${arch}" CGO_ENABLED=0 \
              go build -C cmd -trimpath -ldflags="${ldflags}" -o "../dist/work/${artifact}/${binary}" .
            cp README.md LICENSE "dist/work/${artifact}/"

            if [[ "${os}" == "linux" ]]; then
              mkdir -p "dist/image/linux_${arch}"
              cp "dist/work/${artifact}/${binary}" "dist/image/linux_${arch}/valed"
            fi

            if [[ "${os}" == "windows" ]]; then
              (cd "dist/work/${artifact}" && zip -qr "../../artifacts/${archive}" .)
            else
              tar -C "dist/work/${artifact}" -czf "dist/artifacts/${archive}" .
            fi
            rm -rf "dist/work/${artifact}"
          done

          (cd dist/artifacts && sha256sum *.tar.gz *.zip > checksums.txt)

      - name: Build cmd module artifacts
        if: steps.release.outputs.skip != 'true' && steps.release.outputs.module_path == 'cmd'
        shell: bash
        run: |
          set -euo pipefail

          module_version="${{ steps.release.outputs.module_version }}"
          commit="${{ steps.tag.outputs.commit }}"
          date="${{ steps.tag.outputs.date }}"
          ldflags="-s -w -X main.version=${module_version} -X main.commit=${commit} -X main.date=${date}"
          platforms=(
            linux/amd64
            linux/arm64
            darwin/amd64
            darwin/arm64
            windows/amd64
            windows/arm64
          )

          mkdir -p dist/artifacts dist/work
          for platform in "${platforms[@]}"; do
            os="${platform%/*}"
            arch="${platform#*/}"
            artifact="valed_cmd_${module_version}_${os}_${arch}"
            binary="valed"
            archive="${artifact}.tar.gz"
            if [[ "${os}" == "windows" ]]; then
              binary="valed.exe"
              archive="${artifact}.zip"
            fi

            mkdir -p "dist/work/${artifact}"
            GOOS="${os}" GOARCH="${arch}" CGO_ENABLED=0 \
              go build -C cmd -trimpath -ldflags="${ldflags}" -o "../dist/work/${artifact}/${binary}" .
            cp README.md LICENSE "dist/work/${artifact}/"

            if [[ "${os}" == "windows" ]]; then
              (cd "dist/work/${artifact}" && zip -qr "../../artifacts/${archive}" .)
            else
              tar -C "dist/work/${artifact}" -czf "dist/artifacts/${archive}" .
            fi
            rm -rf "dist/work/${artifact}"
          done

          (cd dist/artifacts && sha256sum *.tar.gz *.zip > checksums.txt)

      - name: Build module source artifacts
        if: steps.release.outputs.skip != 'true' && steps.release.outputs.is_root != 'true' && steps.release.outputs.module_path != 'cmd'
        shell: bash
        run: |
          set -euo pipefail

          module_path="${{ steps.release.outputs.module_path }}"
          module_slug="${{ steps.release.outputs.module_slug }}"
          module_version="${{ steps.release.outputs.module_version }}"
          tag="${{ steps.release.outputs.tag }}"

          mkdir -p dist/artifacts
          git archive --format=zip --output="dist/artifacts/${module_slug}_${module_version}.zip" "${tag}" "${module_path}"
          (cd dist/artifacts && sha256sum *.zip > checksums.txt)

      - name: Prepare container image metadata
        if: steps.release.outputs.skip != 'true' && steps.release.outputs.is_root == 'true'
        id: image
        env:
          PRERELEASE: ${{ inputs.prerelease || 'false' }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.release.outputs.tag }}"
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          version="${tag#v}"
          tags="${image}:${tag}"

          if [[ "${version}" != "${tag}" ]]; then
            tags="${tags}"$'\n'"${image}:${version}"
          fi
          if [[ "${PRERELEASE}" != "true" && "${tag}" != *-* ]]; then
            tags="${tags}"$'\n'"${image}:latest"
          fi

          {
            echo "image=${image}"
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

          cp Dockerfile.release dist/image/Dockerfile

      - name: Set up QEMU
        if: steps.release.outputs.skip != 'true' && steps.release.outputs.is_root == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.release.outputs.skip != 'true' && steps.release.outputs.is_root == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.release.outputs.skip != 'true' && steps.release.outputs.is_root == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push container image
        if: steps.release.outputs.skip != 'true' && steps.release.outputs.is_root == 'true'
        uses: docker/build-push-action@v6
        with:
          context: dist/image
          file: dist/image/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.title=Vale
            org.opencontainers.image.description=Library-first reverse proxy gateway and valed binary.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.release.outputs.tag }}
            org.opencontainers.image.revision=${{ steps.tag.outputs.commit }}
            org.opencontainers.image.created=${{ steps.tag.outputs.date }}

      - name: Publish release
        if: steps.release.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ inputs.prerelease || 'false' }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"

          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${{ steps.release.outputs.release_title }}" \
              --notes-file release-notes.md
          else
            args=(
              release create "${tag}"
              --repo "${GITHUB_REPOSITORY}"
              --title "${{ steps.release.outputs.release_title }}"
              --notes-file release-notes.md
              --verify-tag
            )

            if [[ "${PRERELEASE}" == "true" ]]; then
              args+=(--prerelease)
            fi

            gh "${args[@]}"
          fi

          gh release upload "${tag}" dist/artifacts/* --repo "${GITHUB_REPOSITORY}" --clobber
